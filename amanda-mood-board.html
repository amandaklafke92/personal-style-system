  <span style={{
    fontSize: "10px", fontWeight: 600, padding: "3px 10px",

    fontFamily: "'DM Sans', sans-serif", whiteSpace: "nowrap",
  }}>{label}</span>
);

const EntryCard = ({ entry }) => {
  const cat = categories[entry.category];
  const verd = verdicts[entry.verdict];
  return (
    <div style={{
      background: c.card, borderRadius: "12px", padding: "20px 24px",
      border: `1px solid ${c.border}`, display: "flex", flexDirection: "column", gap: "12px",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px", flexWrap: "wrap" }}>
        <h3 style={{ margin: 0, fontSize: "15px", fontFamily: "'Instrument Serif', serif", color: c.text, flex: 1, minWidth: 200 }}>
          {entry.title}
        </h3>
        <div style={{ display: "flex", gap: "6px", flexShrink: 0 }}>
          <Badge label={cat.label} color={cat.color} bg={cat.bg} />
          <Badge label={verd.label} color={verd.color} bg={verd.bg} />
        </div>
      </div>

      <p style={{ margin: 0, fontSize: "13px", color: c.textMuted, lineHeight: 1.6, fontStyle: "italic" }}>
        {entry.description}
      </p>

      <div>
        <p style={{ margin: "0 0 4px", fontSize: "11px", fontWeight: 600, color: c.green, textTransform: "uppercase", letterSpacing: "0.5px" }}>
          Why it works
        </p>
        <p style={{ margin: 0, fontSize: "13px", color: c.text, lineHeight: 1.6 }}>
          {entry.whyItWorks}
        </p>
      </div>

      {entry.whatToChange && (
        <div>
          <p style={{ margin: "0 0 4px", fontSize: "11px", fontWeight: 600, color: c.coral, textTransform: "uppercase", letterSpacing: "0.5px" }}>
            What to adapt
          </p>
          <p style={{ margin: 0, fontSize: "13px", color: c.text, lineHeight: 1.6 }}>
            {entry.whatToChange}
          </p>
        </div>
      )}

      <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
        {entry.keyElements.map((el, i) => (
          <span key={i} style={{
            fontSize: "11px", padding: "3px 10px", borderRadius: "8px",
            background: c.bgAlt, color: c.textMuted, fontFamily: "'DM Sans', sans-serif",
          }}>{el}</span>
        ))}
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${c.border}`, paddingTop: "10px", marginTop: "2px" }}>
        <span style={{ fontSize: "11px", color: c.accent, fontWeight: 500 }}>
          Formula: {entry.formulaMatch}
        </span>
        <span style={{ fontSize: "11px", color: c.textMuted }}>
          {entry.source === "own" ? "📸 My outfit" : "📱 Instagram save"}

        <p style={{ margin: 0, fontSize: "12px", color: c.warm, fontStyle: "italic", lineHeight: 1.5 }}>

};

function MoodBoard() {
  const [filter, setFilter] = useState("all");
  const [verdictFilter, setVerdictFilter] = useState("all");

  const filtered = entries.filter(e => {
    if (filter !== "all" && e.category !== filter) return false;
    if (verdictFilter !== "all" && e.verdict !== verdictFilter) return false;
    return true;
  });

  const patternCounts = {};
  const allElements = [];
  entries.forEach(e => {
    e.keyElements.forEach(el => {
      patternCounts[el] = (patternCounts[el] || 0) + 1;
      allElements.push(el);
    });
  });
  const topPatterns = Object.entries(patternCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10);

  const yesCount = entries.filter(e => e.verdict === "yes").length;
  const adaptCount = entries.filter(e => e.verdict === "adapt").length;
  const noCount = entries.filter(e => e.verdict === "no").length;
  const ownCount = entries.filter(e => e.source === "own").length;

  return (
    <div style={{ minHeight: "100vh", background: c.bg, fontFamily: "'DM Sans', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: c.charcoal, padding: "36px 24px 28px", textAlign: "center" }}>
        <p style={{ margin: "0 0 4px", fontSize: "11px", letterSpacing: "3px", color: c.warm, textTransform: "uppercase" }}>Style Mood Board</p>
        <h1 style={{ margin: 0, fontSize: "28px", color: c.cream, fontFamily: "'Instrument Serif', serif", fontWeight: 400 }}>
          Amanda's Inspiration Tracker
        </h1>
        <p style={{ margin: "10px auto 0", fontSize: "13px", color: "#9C8E80", maxWidth: 480, lineHeight: 1.5 }}>
          A living collection of outfit inspiration — catalogued, annotated, and mapped to your body, palette, and style direction.
        </p>
      </div>

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "24px 24px 64px" }}>

        {/* Pattern Analysis */}
        <div style={{ background: c.card, borderRadius: "12px", padding: "24px", border: `1px solid ${c.border}`, marginBottom: "24px" }}>
          <h2 style={{ margin: "0 0 16px", fontSize: "18px", fontFamily: "'Instrument Serif', serif", color: c.text }}>
            Pattern Analysis
          </h2>
          <p style={{ margin: "0 0 16px", fontSize: "13px", color: c.textMuted, lineHeight: 1.6 }}>
            Based on {entries.length} saved looks ({ownCount} own outfits, {entries.length - ownCount} external inspiration). Here's what keeps showing up:
          </p>

          <div style={{ display: "flex", flexWrap: "wrap", gap: "8px", marginBottom: "20px" }}>
            {topPatterns.map(([el, count]) => (
              <div key={el} style={{
                display: "flex", alignItems: "center", gap: "6px",
                background: c.bgAlt, borderRadius: "8px", padding: "6px 12px",
              }}>
                <span style={{ fontSize: "12px", color: c.text, fontWeight: 500 }}>{el}</span>
                <span style={{
                  fontSize: "10px", fontWeight: 700, color: c.accent,
                  background: c.accentLight, borderRadius: "50%", width: 20, height: 20,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>{count}</span>
              </div>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
            <div style={{ background: c.greenLight, borderRadius: "8px", padding: "12px 16px" }}>
              <span style={{ fontSize: "24px", fontWeight: 700, color: c.green }}>{yesCount}</span>
              <p style={{ margin: "2px 0 0", fontSize: "11px", color: c.green, fontWeight: 500 }}>Works as-is on your body</p>
            </div>
            <div style={{ background: c.warmLight, borderRadius: "8px", padding: "12px 16px" }}>
              <span style={{ fontSize: "24px", fontWeight: 700, color: c.warm }}>{adaptCount}</span>
              <p style={{ margin: "2px 0 0", fontSize: "11px", color: c.warm, fontWeight: 500 }}>Needs adapting for your shape</p>
            </div>
          </div>

          <div style={{ marginTop: "16px", padding: "16px", background: c.bgAlt, borderRadius: "8px" }}>
            <p style={{ margin: 0, fontSize: "13px", color: c.text, lineHeight: 1.7 }}>
              <strong>Emerging themes:</strong> You're consistently drawn to denim-as-a-layer (shirts, jackets), earth tones mixed with denim blue, and waist-defining details (belts, tucks). The most common adaptation needed is swapping wide/baggy bottoms for straight or tapered ones. Your eye for colour and layering is strong — proportions are the main thing to watch.
            </p>
          </div>
        </div>

        {/* Filters */}
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "20px" }}>
          <span style={{ fontSize: "12px", color: c.textMuted, alignSelf: "center", marginRight: "4px" }}>Category:</span>
          {[{ key: "all", label: "All" }, ...Object.entries(categories).map(([k, v]) => ({ key: k, label: v.label }))].map(f => (
            <button key={f.key} onClick={() => setFilter(f.key)} style={{
              padding: "6px 14px", borderRadius: "16px", border: "none", cursor: "pointer",
              fontSize: "11px", fontFamily: "'DM Sans', sans-serif", fontWeight: filter === f.key ? 600 : 400,
              background: filter === f.key ? c.accent : c.bgAlt,
              color: filter === f.key ? c.card : c.textMuted,
              transition: "all 0.15s ease",
            }}>{f.label}</button>
          ))}
        </div>
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "24px" }}>
          <span style={{ fontSize: "12px", color: c.textMuted, alignSelf: "center", marginRight: "4px" }}>Verdict:</span>
          {[{ key: "all", label: "All" }, ...Object.entries(verdicts).map(([k, v]) => ({ key: k, label: v.label }))].map(f => (
            <button key={f.key} onClick={() => setVerdictFilter(f.key)} style={{
              padding: "6px 14px", borderRadius: "16px", border: "none", cursor: "pointer",
              fontSize: "11px", fontFamily: "'DM Sans', sans-serif", fontWeight: verdictFilter === f.key ? 600 : 400,
              background: verdictFilter === f.key ? c.warm : c.bgAlt,
              color: verdictFilter === f.key ? c.card : c.textMuted,
              transition: "all 0.15s ease",
            }}>{f.label}</button>
          ))}
        </div>

        {/* Entries */}
        <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
          {filtered.map(entry => (
            <EntryCard key={entry.id} entry={entry} />
          ))}
          {filtered.length === 0 && (
            <p style={{ textAlign: "center", color: c.textMuted, fontSize: "14px", padding: "40px 0" }}>
              No looks match this filter combination.
            </p>
          )}
        </div>

        {/* Footer */}
        <div style={{ marginTop: "32px", padding: "20px", background: c.warmLight, borderRadius: "12px", textAlign: "center" }}>
          <p style={{ margin: 0, fontSize: "13px", color: c.text, lineHeight: 1.7 }}>
            Keep uploading photos and screenshots — each batch refines the pattern map. The more I see of what catches your eye, the more precise the recommendations get.
          </p>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(MoodBoard));
  </script>
</body>
</html>
